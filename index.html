<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Overseas — এজেন্ট লগইন</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
  crossorigin="anonymous" referrerpolicy="no-referrer">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- face-api.js for optional face verification (same accounts/photos created from the admin panel) -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
  :root{
    --navy:#141820; --navy2:#2a3245; --gold:#e0a530; --teal:#2563eb; --bg:#f7f2ea;
    --ok:#1a9e5c; --fail:#dc3545; --warn:#d4922a; --border:#e2ddd5;
    --gold-grad:linear-gradient(135deg,#f6d998,#e0a530 45%,#a8710f);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Hind Siliguri','Noto Sans Bengali','Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:#1c2733;}

  /* ---------- LOGIN ---------- */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:radial-gradient(circle at 15% 15%,rgba(37,99,235,.35),transparent 45%),linear-gradient(135deg,var(--navy),var(--navy2));}
  .loginBox{background:#fff;padding:32px 28px;border-radius:14px;width:100%;max-width:340px;box-shadow:0 24px 60px rgba(20,24,32,.4);}
  .loginBox h1{font-size:18px;margin:0 0 4px;color:var(--navy);display:flex;align-items:center;gap:8px;}
  .loginBox h1 i{color:var(--gold);}
  .loginBox p.sub{font-size:12px;color:#7a8794;margin:0 0 20px;}
  .loginBox input{width:100%;padding:10px 12px;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;}
  .btn{background:var(--navy);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;width:100%;}
  .btn:hover{background:var(--navy2);}
  .btn.gold{background:var(--gold);color:#1c2733;}
  .btn.small{width:auto;padding:6px 12px;font-size:12px;}
  .btn.danger{background:var(--fail);}
  #faceStep{text-align:center;}
  .faceScanWrap{position:relative;width:100%;max-width:280px;aspect-ratio:4/3;margin:0 auto;border-radius:14px;overflow:hidden;background:#0c0f14;box-shadow:0 0 0 1px rgba(224,165,48,.25),0 14px 30px rgba(20,24,32,.35);}
  .faceScanWrap video{width:100%;height:100%;object-fit:cover;display:block;border-radius:0;transform:scaleX(-1);}
  .faceScanWrap .fsCorner{position:absolute;width:22px;height:22px;border:2.5px solid var(--gold);opacity:.9;}
  .faceScanWrap .fsCorner.tl{top:8px;left:8px;border-right:none;border-bottom:none;border-top-left-radius:6px;}
  .faceScanWrap .fsCorner.tr{top:8px;right:8px;border-left:none;border-bottom:none;border-top-right-radius:6px;}
  .faceScanWrap .fsCorner.bl{bottom:8px;left:8px;border-right:none;border-top:none;border-bottom-left-radius:6px;}
  .faceScanWrap .fsCorner.br{bottom:8px;right:8px;border-left:none;border-top:none;border-bottom-right-radius:6px;}
  .faceScanWrap .fsScanLine{position:absolute;left:6px;right:6px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);top:8%;animation:fsScan 2.6s ease-in-out infinite;pointer-events:none;}
  @keyframes fsScan{0%{top:8%;opacity:0;}10%{opacity:1;}50%{top:88%;opacity:1;}90%{opacity:0;}100%{top:8%;opacity:0;}}
  #faceStatusBar{position:absolute;left:0;right:0;bottom:0;padding:8px 10px 7px;font-size:11.5px;line-height:1.35;color:#f2e9d8;background:linear-gradient(0deg,rgba(0,0,0,.78),rgba(0,0,0,0));text-align:center;min-height:14px;}
  canvas{border-radius:10px;width:100%;max-width:280px;}
  #loginMsg{font-size:12px;color:var(--fail);min-height:16px;margin-top:4px;}

  /* ---------- APP ---------- */
  #app{display:none;min-height:100vh;max-width:480px;margin:0 auto;background:var(--bg);}
  .shell{display:flex;flex-direction:column;min-height:100vh;}
  .top-nav{background:var(--navy);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 3px 20px rgba(20,24,32,.35);}
  .top-nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a8710f,#f6d998 22%,#e0a530 50%,#f6d998 78%,#a8710f);}
  .nav-brand{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;color:#fff;min-width:0;flex:1 1 auto;overflow:hidden;}
  .nav-brand span.brand-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto;}
  .nav-brand i{color:var(--gold);flex-shrink:0;}
  .nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .nav-actions button{background:transparent;border:none;color:#cfd6e0;font-size:16px;cursor:pointer;}
  .content{padding:14px;padding-bottom:78px;flex:1 1 auto;}

  .page{display:none;}
  .page.active{display:block;}

  .bottom-nav{position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;width:100%;box-shadow:0 -4px 16px rgba(20,24,32,.08);z-index:200;padding-bottom:env(safe-area-inset-bottom);}
  .bn-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;font-size:10px;color:#8a8478;cursor:pointer;font-family:inherit;}
  .bn-btn i{font-size:17px;}
  .bn-btn.active{color:var(--gold);}

  .statRow{display:flex;gap:10px;margin-bottom:14px;}
  .statCard{flex:1;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
  .statCard .num{font-size:20px;font-weight:700;color:var(--navy);}
  .statCard .lbl{font-size:11px;color:#8a8478;margin-top:2px;}

  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .card h3{margin:0 0 10px;font-size:15px;color:var(--navy);display:flex;align-items:center;gap:8px;}
  .card h3 i{color:var(--gold);}
  .formGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .formGrid input, .formGrid select{grid-column:span 1;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .formGrid input.full, .formGrid select.full, .formGrid textarea{grid-column:1 / -1;}
  textarea{padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:56px;}
  .hint{font-size:12px;color:#8a8478;margin:0 0 10px;}

  .custItem{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;}
  .custItem .cname{font-weight:700;font-size:14px;color:var(--navy);}
  .custItem .csub{font-size:12px;color:#5b6b7a;margin-top:2px;}
  .stagePill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(224,165,48,.15);color:#a8710f;margin-top:6px;}
  .stagePill.done{background:rgba(26,158,92,.12);color:var(--ok);}
  .stagePill.fail{background:rgba(220,53,69,.1);color:var(--fail);}
  /* --- বিস্তারিত ভিউ (এডমিন প্যানেল থেকে পোর্ট করা, শুধু দেখার জন্য) --- */
  .avatarCircle{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.15);}
  .accItem{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;background:#fff;}
  .accItem:last-child{margin-bottom:0;}
  .accHead{display:flex;justify-content:space-between;align-items:flex-start;padding:12px;cursor:pointer;gap:11px;}
  .accHead .chev-ico{margin-top:8px;}
  .accHead .accTextWrap{flex:1;min-width:0;}
  .accHead .accName{font-weight:700;font-size:14px;color:var(--navy);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .accHead .accSub{font-size:12px;color:#5b6b7a;margin-top:2px;}
  .accBody{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
  .accBody .accRow{padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
  .accBody .accRow:last-child{border-bottom:none;}
  .accBody .accRow.noBorder{border-bottom:none;}
  .accBody .accLabel{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#8896ab;margin-bottom:2px;}
  .accBody .accActions{display:flex;flex-wrap:nowrap;gap:6px;margin-top:10px;}
  .accBody .accActions .btn.small{flex:1;padding:8px 2px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;width:auto;}
  .accBody .accActions .btn.small i{margin-right:3px;}
  .accInfoGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
  .accInfoItem{min-width:0;text-align:center;}
  .accInfoItem .aii-lbl{display:flex;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#8896ab;margin-bottom:3px;}
  .accInfoItem .aii-val{font-size:12px;font-weight:600;color:#1c2733;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
  .accSectionTitle{font-size:12px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;margin:10px 0 8px;}
  .accSectionTitle i{color:var(--gold);width:14px;text-align:center;}
  .noteBox{width:100%;min-height:64px;resize:vertical;font-family:inherit;padding:8px;border-radius:8px;border:1px solid var(--border);font-size:12.5px;box-sizing:border-box;background:#faf8f4;}
  .chev-ico{font-size:11px;color:#8896ab;display:inline-block;transition:transform .25s cubic-bezier(.22,.68,0,1.2);}
  .chev-ico.open{transform:rotate(180deg);}
  .payProgWrap{margin:8px 0 12px;}
  .payProgOuter{height:8px;border-radius:6px;background:#eee7da;overflow:hidden;}
  .payProgInner{height:100%;border-radius:6px;background:linear-gradient(90deg,#1a9e5c,#25c17a);transition:width .3s ease;}
  .payStatsRow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px;margin:6px 0 2px;}
  .payStatsRow .ps-item{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .payStatsRow .ps-item b{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .payStatsRow .ps-item:last-child{text-align:right;}
  .fieldRow{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12.5px;}
  .fieldRow .fr-meta{color:#8896ab;font-size:11px;}
  .callSheetOverlay{display:none;position:fixed;inset:0;background:rgba(20,24,32,.55);z-index:600;align-items:flex-end;justify-content:center;}
  .callSheetOverlay.active{display:flex;animation:csFade .15s ease;}
  @keyframes csFade{from{opacity:0;}to{opacity:1;}}
  .callSheetBox{background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:22px 20px calc(18px + env(safe-area-inset-bottom,0));text-align:center;animation:csUp .2s ease;}
  @keyframes csUp{from{transform:translateY(30px);opacity:.5;}to{transform:translateY(0);opacity:1;}}
  .callSheetBox h4{margin:0 0 20px;font-size:14.5px;color:var(--navy);font-weight:700;}
  .callSheetOptions{display:flex;justify-content:center;gap:40px;margin-bottom:18px;}
  .callSheetOpt{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:none;background:none;padding:0;}
  .callSheetOpt .csIcon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 6px 16px rgba(20,24,32,.18);}
  .callSheetOpt span{font-size:12px;color:#3a4451;font-weight:600;}
  .callSheetCancel{display:block;width:100%;padding:12px;border:none;background:var(--bg);color:#5b6b7a;font-size:14px;font-weight:700;border-radius:10px;cursor:pointer;}
  .emptyMsg{text-align:center;color:#8a8478;font-size:13px;padding:24px 0;}

  /* ---------- VISA INFO CARDS (read-only for agents) ---------- */
  .visaCard{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:linear-gradient(180deg,#fff,#fbf9f5);}
  .visaCard:last-child{margin-bottom:0;}
  .visaCard .vc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
  .visaCard .vc-title{font-weight:800;font-size:14px;color:var(--navy);display:flex;align-items:center;gap:7px;}
  .vc-price{background:none;color:var(--navy);font-size:12px;font-weight:800;padding:0;margin-left:auto;display:inline-flex;align-items:center;gap:5px;}
  .vc-price i{color:#b8860b;}
  .visaDetailLines{display:flex;flex-direction:column;gap:5px;margin-top:2px;}
  .visaDetailLine{font-size:13px;font-weight:600;color:#3b4552;line-height:1.4;}
  .visaDetailLine .chipKey{color:#a8710f;font-weight:800;}
  .visaStatRow{display:flex;flex-wrap:nowrap;justify-content:flex-start;align-items:center;gap:14px;font-size:11px;color:#5b6b7a;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
  .visaStatRow .vsr-stats{display:flex;gap:14px;flex-shrink:1;min-width:0;}
  .visaStatRow .vsr-stats span{white-space:nowrap;}
  .visaStatRow b{color:var(--navy);font-size:13px;}
  .visaStatRow .vsr-actions{display:flex;gap:14px;flex-shrink:0;}
  .visaStatRow .vsr-actions .icon-btn{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:var(--navy2);font-size:14px;cursor:pointer;flex-shrink:0;padding:2px;}
  .visaStatRow .vsr-actions .icon-btn span{font-size:10px;font-weight:600;white-space:nowrap;}
  .visaStatRow .vsr-actions .icon-btn.gold{color:var(--gold);}

  /* ---------- MODAL ---------- */
  .modalOverlay{display:none;position:fixed;inset:0;background:rgba(20,24,32,.55);z-index:500;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
  .modalOverlay.active{display:flex;}
  .modalBox{background:#fff;border-radius:14px;padding:20px;max-width:440px;width:100%;margin-top:24px;position:relative;}
  .modalBox h3{margin:0 0 4px;font-size:15px;color:var(--navy);}
  .modalBox .close-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;color:#8896ab;cursor:pointer;}
</style>
</head>
<body>

<!-- ================= LOGIN SCREEN ================= -->
<div id="loginScreen">
  <div class="loginBox">
    <h1><i class="fas fa-user-tie"></i>এজেন্ট লগইন</h1>
    <p style="text-align:center;font-size:11px;color:#a8a29a;margin:-2px 0 16px;">Talent Overseas Pvt. Ltd</p>

    <div id="faceStep">
      <div class="faceScanWrap">
        <video id="video" autoplay muted playsinline></video>
        <div class="fsScanLine"></div>
        <div class="fsCorner tl"></div>
        <div class="fsCorner tr"></div>
        <div class="fsCorner bl"></div>
        <div class="fsCorner br"></div>
        <div id="faceStatusBar"></div>
      </div>
      <button class="btn small" style="width:100%;background:#8a8478;margin-top:10px;" onclick="showPassStep()">ইমেইল দিয়ে লগইন করুন</button>
    </div>

    <div id="passStep" style="display:none;">
      <input id="loginEmail" type="email" placeholder="ইমেইল" autocomplete="username">
      <input id="loginPass" type="password" placeholder="পাসওয়ার্ড" autocomplete="current-password">
      <button class="btn gold" onclick="handleAgentLogin()"><i class="fas fa-right-to-bracket" style="margin-right:6px;"></i>লগইন করুন</button>
    </div>

    <div id="loginMsg"></div>
  </div>
</div>

<!-- ================= AGENT APP ================= -->
<div id="app">
  <div class="shell">
    <div class="top-nav">
      <div class="nav-brand"><i class="fas fa-building-flag" id="navBrandIcon"></i><img id="navAvatar" style="display:none;width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;" alt=""><span class="brand-text">Talent Overseas Pvt. Ltd</span><button id="adminCallBtn" onclick="callAdmin()" title="এডমিনকে কল করুন" style="background:rgba(212,175,55,.14);border:none;color:var(--gold);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;margin-left:4px;"><i class="fas fa-phone"></i></button></div>
      <div class="nav-actions">
        <span id="agentNameTag" style="color:#cfd6e0;font-size:12px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button id="inboxBellBtn" onclick="openInboxModal()" title="বার্তা" style="position:relative;display:none;">
          <i class="fas fa-bell"></i>
          <span id="inboxBadge" style="display:none;position:absolute;top:-2px;right:-4px;background:var(--fail);color:#fff;font-size:9px;line-height:1;padding:2px 4px;border-radius:8px;min-width:14px;text-align:center;"></span>
        </button>
        <button onclick="agentLogout()" title="লগআউট"><i class="fas fa-right-from-bracket"></i></button>
      </div>
    </div>

    <div class="content">
      <div id="pageHome" class="page active">
        <div class="statRow">
          <div class="statCard"><div class="num" id="statTotal">0</div><div class="lbl">মোট কাস্টমার</div></div>
          <div class="statCard"><div class="num" id="statActive">0</div><div class="lbl">চলমান জার্নি</div></div>
          <div class="statCard"><div class="num" id="statDeparted">0</div><div class="lbl">রওনা হয়েছে</div></div>
        </div>

        <div class="card">
          <h3 style="justify-content:space-between;">
            <span><i class="fas fa-earth-asia" style="margin-right:8px;"></i>ভিসার তথ্য</span>
          </h3>
          <input id="visaSearch" placeholder="দেশ খুঁজুন..." oninput="renderVisaInfoList()" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px;">
          <div id="visaInfoList"></div>
        </div>
      </div>

      <div id="pageCustomers" class="page">
        <div class="card">
          <h3><i class="fas fa-users"></i>আপনার কাস্টমাররা</h3>
          <input id="custSearch" placeholder="নাম বা ফোন দিয়ে খুঁজুন..." oninput="renderCustomers()" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px;">
          <div id="custList"></div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button type="button" class="bn-btn active" id="bnHome" onclick="showPage('home')"><i class="fas fa-house"></i><span>হোম</span></button>
      <button type="button" class="bn-btn" id="bnCustomers" onclick="showPage('customers')"><i class="fas fa-users"></i><span>কাস্টমার</span></button>
    </div>
  </div>
</div>

<!-- ================= VISA MESSAGE MODAL ================= -->
<div class="modalOverlay" id="visaMessageModal">
  <div class="modalBox">
    <button class="close-x" onclick="closeVisaMessageModal()"><i class="fas fa-xmark"></i></button>
    <h3 style="margin-top:0;">মেসেজ পাঠান</h3>
    <p class="hint" style="margin-top:0;" id="vmVisaLabel"></p>
    <textarea id="vmText" rows="4" placeholder="কাস্টমারের বিস্তারিত বা আপনার বার্তা লিখুন..." style="width:100%;box-sizing:border-box;"></textarea>
    <div style="margin-top:10px;">
      <label class="hint" style="display:block;margin-bottom:6px;"><i class="fas fa-paperclip" style="margin-right:4px;"></i>ডকুমেন্ট সংযুক্ত করুন <span style="color:var(--fail);">*</span></label>

/* ================= LOGIN: ইমেইল-পাসওয়ার্ড (ফেস ফেইল হলে ফলব্যাক) ================= */

        return;
      }

        return;
      }
      if(data.password !== pass){
        msg.textContent = "পাসওয়ার্ড ভুল হয়েছে।";
        return;
      }
      if(data.active === false){
        msg.textContent = "আপনার অ্যাকাউন্ট নিষ্ক্রিয় করা হয়েছে। অ্যাডমিনের সাথে যোগাযোগ করুন।";
        return;
      }

      currentAgentData = data;
      enterAgentApp();
    })
    .catch(err => { msg.textContent = "লগইন ব্যর্থ: " + err.message; });
}

/* ---- ফেস লগইন: ক্যামেরা চালু হওয়া মাত্র স্বয়ংক্রিয়ভাবে বারবার স্ক্যান করে,
   কয়েকবার চেষ্টায় মিল না পেলে নিজে থেকেই ইমেইল-পাসওয়ার্ড স্টেপে চলে যায় ---- */
const FACE_MAX_ATTEMPTS = 20;        // মোট কতবার স্ক্যান করার পর ফেইলওভার হবে
const FACE_SCAN_INTERVAL = 900;      // প্রতিটি স্ক্যানের মধ্যে বিরতি (ms)
const FACE_MATCH_THRESHOLD = 0.5;    // euclidean distance থ্রেশহোল্ড
const FACE_CONSECUTIVE_NEEDED = 2;   // ভুয়া মিল এড়াতে পরপর কতবার মিল লাগবে

let faceLoopActive = false;
let faceLoopTimer = null;
let faceConsecutiveMatch = 0;
let faceAttempts = 0;

function startCamera(){
  const video = document.getElementById('video');
  const msg = document.getElementById('faceStatusBar');
  msg.style.color = "#f2e9d8";
  msg.textContent = "ক্যামেরা চালু হচ্ছে...";
  navigator.mediaDevices.getUserMedia({video:{width:280,height:210}})
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => { video.play(); beginAutoFaceLogin(); };
    })
    .catch(() => {
      const failMsg = document.getElementById('loginMsg');
      failMsg.style.color = "var(--fail)";
      failMsg.textContent = "ক্যামেরা এক্সেস দিতে হবে।";
      showPassStep();
    });
}
function stopCamera(){
  faceLoopActive = false;
  if(faceLoopTimer){ clearTimeout(faceLoopTimer); faceLoopTimer = null; }
  const video = document.getElementById('video');
  if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); }
  const statusBar = document.getElementById('faceStatusBar');
  if(statusBar) statusBar.textContent = "";
}

let modelsLoaded = false;
async function loadModels(){
  if(modelsLoaded) return;
  const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/weights";
  const CACHE_NAME = "face-api-models-v1";
  const originalFetch = window.fetch;
  const canCache = ('caches' in window);
  if(canCache){
    window.fetch = async function(input, init){
      const url = (typeof input === 'string') ? input : (input && input.url);
      if(url && url.indexOf(MODEL_URL) === 0){
        try{
          const cache = await caches.open(CACHE_NAME);
          const cached = await cache.match(url);
          if(cached) return cached;
          const response = await originalFetch(input, init);
          if(response && response.ok) cache.put(url, response.clone());
          return response;
        }catch(e){
          return originalFetch(input, init);
        }
      }
      return originalFetch(input, init);
    };
  }
  try{
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
  } finally {
    if(canCache) window.fetch = originalFetch;
  }
  modelsLoaded = true;
}

async function beginAutoFaceLogin(){
  const msg = document.getElementById('faceStatusBar');
  msg.style.color = "#f2e9d8";
  msg.textContent = "মডেল লোড হচ্ছে...";
  try{
    await loadModels();
  }catch(e){
    const failMsg = document.getElementById('loginMsg');
    failMsg.style.color = "var(--fail)";
    failMsg.textContent = "মডেল লোড ব্যর্থ, ইমেইল দিয়ে লগইন করুন।";
    showPassStep();
    return;
  }
  faceConsecutiveMatch = 0;
  faceAttempts = 0;
  faceLoopActive = true;
  msg.textContent = "মুখ শনাক্ত করা হচ্ছে...";
  runFaceScan();
}

async function runFaceScan(){
  if(!faceLoopActive) return;
  const msg = document.getElementById('faceStatusBar');
  const video = document.getElementById('video');
  faceAttempts++;

  try{
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks().withFaceDescriptor();

    if(!faceLoopActive) return; // ক্লিক করে ইমেইল-স্টেপে চলে যাওয়া হয়ে থাকলে এখানেই থেমে যাবে

    if(detection){
      const liveDescriptor = Array.from(detection.descriptor);

      // এখনো জানা নেই কোন এজেন্ট — তাই সব এজেন্টের সংরক্ষিত ফেস-ডিসক্রিপ্টরের সাথে মিলিয়ে দেখা হচ্ছে
      const snap = await db.ref('admins').once('value');

      if(!faceLoopActive) return; // Firebase রেসপন্স আসার মাঝে ক্লিক হয়ে থাকলে এখানেও থেমে যাবে

      const all = snap.val() || {};
      let bestUid = null, bestData = null, bestDist = Infinity;
      Object.entries(all).forEach(([uid, data]) => {
        if(!data || data.role !== 'agent' || data.active === false || !data.faceDescriptor) return;
        const dist = faceapi.euclideanDistance(liveDescriptor, data.faceDescriptor);
        if(dist < bestDist){ bestDist = dist; bestUid = uid; bestData = data; }
      });

      if(bestUid && bestDist < FACE_MATCH_THRESHOLD){
        faceConsecutiveMatch++;
        msg.textContent = `যাচাই হচ্ছে (${faceConsecutiveMatch}/${FACE_CONSECUTIVE_NEEDED})...`;
        if(faceConsecutiveMatch >= FACE_CONSECUTIVE_NEEDED){
          faceLoopActive = false;
          pendingUid = bestUid;
          currentAgentData = bestData;
          msg.style.color = "#7be3ab";
          msg.textContent = "ভেরিফাই সফল, প্রবেশ করানো হচ্ছে...";
          stopCamera();
          enterAgentApp();
          return;
        }
      } else {
        faceConsecutiveMatch = 0;
        msg.textContent = "মুখ শনাক্ত করা হচ্ছে...";
      }
    } else {
      faceConsecutiveMatch = 0;
      msg.textContent = "ভালো আলোতে ক্যামেরার সামনে থাকুন";
    }
  }catch(e){
    // সাময়িক স্ক্যান-এরর উপেক্ষা করে লুপ চালিয়ে যাওয়া হচ্ছে
  }

  if(!faceLoopActive) return;

  if(faceAttempts >= FACE_MAX_ATTEMPTS){
    faceLoopActive = false;
    msg.style.color = "var(--fail)";
    msg.textContent = "ফেস লক ফেইল হয়েছে, ইমেইল-পাসওয়ার্ড দিয়ে লগইন করুন।";
    showPassStep();
    return;
  }

  faceLoopTimer = setTimeout(runFaceScan, FACE_SCAN_INTERVAL);
}

function loadAgentMessages(){
  db.ref('agentMessages/' + currentAgentUid).on('value', snap => {
    agentMessagesCache = snap.val() || {};
    purgeOldMessages();
    renderInboxBadge();
    renderInboxList();
  });
  // অ্যাপ খোলা অবস্থায় থাকতে থাকতেই যেসব বার্তার বয়স ২৪ ঘণ্টা পেরিয়ে যায়, সেগুলোও যেন মুছে যায়
  if(msgPurgeTimer) clearInterval(msgPurgeTimer);
  msgPurgeTimer = setInterval(purgeOldMessages, 5 * 60 * 1000);
}

function purgeOldMessages(){
  const now = Date.now();
  Object.entries(agentMessagesCache).forEach(([id, m]) => {
    // শুধু দেখা (read) বার্তাই অটো-ডিলিট হবে, দেখার (readAt) সময় থেকে ২৪ ঘণ্টা পর
    if(m && m.read && m.readAt && (now - m.readAt) > MSG_MAX_AGE_MS){
      db.ref('agentMessages/' + currentAgentUid + '/' + id).remove().catch(() => {});
    }
  });
}

function renderInboxBadge(){
  const bellBtn = document.getElementById('inboxBellBtn');
  const hasAnyMessages = Object.keys(agentMessagesCache).length > 0;
  bellBtn.style.display = hasAnyMessages ? 'inline-block' : 'none';

  const badge = document.getElementById('inboxBadge');
  const unread = Object.values(agentMessagesCache).filter(m => !m.read).length;
  if(unread > 0){
    badge.style.display = 'block';
    badge.textContent = unread > 9 ? '9+' : String(unread);
  } else {
    badge.style.display = 'none';
  }
}

function openInboxModal(){
  renderInboxList();
  document.getElementById('inboxModal').classList.add('active');
  markAllMessagesRead();
}
function closeInboxModal(){
  document.getElementById('inboxModal').classList.remove('active');
}

function markAllMessagesRead(){
  Object.entries(agentMessagesCache).forEach(([id, m]) => {
    if(m && !m.read){
      db.ref('agentMessages/' + currentAgentUid + '/' + id).update({ read: true, readAt: Date.now() }).catch(() => {});
    }
  });
}

function renderInboxList(){
  const el = document.getElementById('inboxList');
  if(!el) return;
  const entries = Object.entries(agentMessagesCache).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));
  if(!entries.length){
    el.innerHTML = '<div class="emptyMsg">কোনো বার্তা নেই।</div>';
    return;
  }
  el.innerHTML = entries.map(([id, m]) => {
    const time = m.createdAt ? new Date(m.createdAt).toLocaleString('bn-BD') : '';
    const label = MSG_TYPE_LABEL[m.type] || 'বার্তা';
    const related = [m.relatedCountry, m.relatedVisaName].filter(Boolean).join(' — ');
    return `
    <div class="custItem" style="cursor:pointer;${m.read ? '' : 'border-color:var(--gold);background:rgba(224,165,48,.06);'}" onclick='markMessageRead(${JSON.stringify(id)})'>
      <div class="cname" style="display:flex;align-items:center;gap:6px;">
        ${!m.read ? '<span style="width:7px;height:7px;border-radius:50%;background:var(--fail);display:inline-block;flex-shrink:0;"></span>' : ''}
        ${label}
      </div>
      ${related ? `<div class="csub">${related}</div>` : ''}
      <div style="font-size:13px;color:#3b4552;margin-top:6px;white-space:pre-wrap;">${escapeHtmlForHl(m.text || '')}</div>
      <div class="csub" style="margin-top:6px;">${time}</div>
    </div>`;
  }).join('');
}

function markMessageRead(id){
  const m = agentMessagesCache[id];
  if(!m || m.read) return;
  db.ref('agentMessages/' + currentAgentUid + '/' + id).update({ read: true, readAt: Date.now() }).catch(() => {});
}

/* ================= USER CHAT (এজেন্ট-অ্যাডমিন মেসেজ, প্রতি কাস্টমার আলাদা থ্রেড) ================= */
let userChatsCache = {};
let ucCurrentUid = null;

function loadUserChats(){
  db.ref('userChats').on('value', snap => {
    userChatsCache = snap.val() || {};
    renderCustomers();
    if(ucCurrentUid) renderUserChatMessages();
  });
}

function getUnreadChatCount(uid){
  const chats = userChatsCache[uid] || {};
  return Object.values(chats).filter(m => m && !m.readByAgent).length;
}

function openUserChat(uid){
  ucCurrentUid = uid;
  const u = myUsers[uid] || {};
  document.getElementById('ucModalTitle').textContent = 'Talent Overseas Pvt. Ltd';
  document.getElementById('ucModalSubtitle').textContent = 'ইউজার: ' + (u.full_name || '-');
  const ucAvatarEl = document.getElementById('ucModalAvatar');
  ucAvatarEl.innerHTML = '<i class="fas fa-building-flag" style="color:var(--gold);"></i>';
  renderUserChatMessages();
  document.getElementById('userChatModal').classList.add('active');
  markUserChatRead(uid);
  setTimeout(() => document.getElementById('ucInputText').focus(), 200);
}
function closeUserChatModal(){
  document.getElementById('userChatModal').classList.remove('active');
  ucCurrentUid = null;
}
function renderUserChatMessages(){
  if(!ucCurrentUid) return;
  const chats = userChatsCache[ucCurrentUid] || {};
  const entries = Object.entries(chats).sort((a,b) => (a[1].createdAt||0) - (b[1].createdAt||0));
  const el = document.getElementById('ucMessagesList');
  if(!entries.length){
    el.innerHTML = '<div class="hint" style="text-align:center;margin-top:20px;">কোনো মেসেজ নেই, কথা শুরু করুন।</div>';
    return;
  }
  el.innerHTML = entries.map(([id, m]) => {
    const mine = m.from === 'agent';
    const time = m.createdAt ? new Date(m.createdAt).toLocaleString('bn-BD') : '';
    return `<div style="align-self:${mine ? 'flex-end' : 'flex-start'};max-width:78%;">
      <div style="background:${mine ? 'var(--navy)' : '#f0ede6'};color:${mine ? '#fff' : '#1c2733'};padding:8px 12px;border-radius:14px;${mine ? 'border-bottom-right-radius:4px;' : 'border-bottom-left-radius:4px;'}font-size:13px;white-space:pre-wrap;word-break:break-word;">${escapeHtmlForHl(m.text || '')}</div>
      <div style="font-size:9.5px;color:#8896ab;margin-top:2px;text-align:${mine ? 'right' : 'left'};">${mine ? '' : ((m.fromName || 'অ্যাডমিন') + ' · ')}${time}</div>
    </div>`;
  }).join('');

}
function sendUserChatMessage(){
  if(!ucCurrentUid) return;
  const input = document.getElementById('ucInputText');
  const text = (input.value || '').trim();
  if(!text) return;
  db.ref('userChats/' + ucCurrentUid).push({
    text, from: 'agent', fromName: (currentAgentData && currentAgentData.name) || 'এজেন্ট', createdAt: Date.now(),
    readByAgent: true, readByAdmin: false
  });
  input.value = '';
  input.style.height = '34px';
}
function markUserChatRead(uid){
  const chats = userChatsCache[uid] || {};
  Object.entries(chats).forEach(([id, m]) => {
    if(m && !m.readByAgent){
      db.ref('userChats/' + uid + '/' + id + '/readByAgent').set(true);
    }
  });
}

/* ================= LOAD & RENDER MY CUSTOMERS ================= */
function loadMyCustomers(){
  db.ref('users').on('value', snap => {
    const all = snap.val() || {};
    allUsersCache = all;
    myUsers = {};
    Object.entries(all).forEach(([uid, u]) => {
      if(u && u.agent_id === currentAgentUid) myUsers[uid] = u;
    });
    renderCustomers();
    renderStats();
    renderVisaInfoList();
  });
  db.ref('journeys').on('value', snap => {
    myJourneys = snap.val() || {};
    renderCustomers();
    renderStats();
    renderVisaInfoList();
  });
}

function getJourneyForUser(uid){
  return Object.values(myJourneys).find(j => j.user_id === uid) || null;
}

function renderStats(){
  const total = Object.keys(myUsers).length;
  let active = 0, departed = 0;
  Object.keys(myUsers).forEach(uid => {
    const j = getJourneyForUser(uid);
    if(!j) return;
    if(j.current_stage === 'DEPARTED') departed++;
    else if(j.current_stage !== 'MEDICAL_FAILED') active++;
  });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statDeparted').textContent = departed;
}

  const q = (document.getElementById('custSearch').value || '').trim().toLowerCase();
  let entries = Object.entries(myUsers);
  if(q){
    entries = entries.filter(([uid, u]) => ((u.full_name||'') + ' ' + (u.phone||'') + ' ' + getUserPhone(u)).toLowerCase().includes(q));
  }
  entries.sort((a,b) => (b[1].created_at||0) - (a[1].created_at||0));
  const el = document.getElementById('custList');

    el.innerHTML = `<div class="emptyMsg">${q ? 'কোনো কাস্টমার পাওয়া যায়নি' : 'এখনো কোনো কাস্টমার যোগ করা হয়নি'}</div>`;

  el.innerHTML = entries.map(([uid, u]) => {
    const j = getJourneyForUser(uid);
    const jid = j ? Object.entries(myJourneys).find(([id, jj]) => jj === j)[0] : null;
    const stage = j ? j.current_stage : null;
    let pillCls = '';
    if(stage === 'DEPARTED') pillCls = 'done';

    // পিলের লেবেল সর্বশেষ ডকুমেন্ট/পেমেন্ট এন্ট্রি থেকে স্বয়ংক্রিয়ভাবে ঠিক করা হয়,

    const docEntriesForStage = u.documents ? Object.values(u.documents) : [];
    const latestDocName = docEntriesForStage.length ? (docEntriesForStage[docEntriesForStage.length - 1].name || '') : '';
    const paymentListForStage = j && j.payments ? Object.values(j.payments).sort((a,b) => (a.date||0) - (b.date||0)) : [];
    const latestPaymentNote = paymentListForStage.length ? (paymentListForStage[paymentListForStage.length - 1].note || '') : '';
    const stageLabel = latestDocName || latestPaymentNote || (stage ? (STAGE_LABEL[stage] || stage) : 'তথ্য নেই');

    const flag = COUNTRY_FLAGS[u.country] || '🌍';
    const initials = (u.full_name || '-').trim().charAt(0).toUpperCase() || '?';

    const customEntries = Object.keys(customFields)
      .filter(fid => u.custom_data && u.custom_data[fid] && customFields[fid])

        <div class="accInfoGrid">

      const label = d.name || 'নামহীন ডকুমেন্ট';

    const ownPhone = getUserPhone(u);
    const phoneDigits = (ownPhone || '').replace(/[^0-9]/g, '');
    const phoneWithCC = phoneDigits ? (phoneDigits.startsWith('88') ? phoneDigits : ('88' + phoneDigits.replace(/^0/, ''))) : '';

    return `
    <div class="accItem">
      <div class="accHead" onclick="toggleAccItem('cu-${uid}')">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;">
          ${avatarHtml}

/* এডমিন প্যানেলের renderPaymentSection-এর ভিউ-অনলি সংস্করণ —
   পেমেন্টের হিসাব দেখা যাবে, কিন্তু কিস্তি যোগ/ডিলিট করার কোনো নিয়ন্ত্রণ নেই */
function renderPaymentSectionReadOnly(j){
  const payments = j.payments || {};
  const totalFee = j.agency_fee || 0;
  const entries = Object.entries(payments).sort((a,b) => (a[1].date||0) - (b[1].date||0));
  const paid = entries.reduce((sum, [pid, p]) => sum + (p.amount || 0), 0);
  const due = totalFee - paid;
  const rowsHtml = entries.length
    ? entries.map(([pid, p]) => `
      <div class="fieldRow">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;">
          <span><i class="fas fa-circle-check" style="color:var(--ok);margin-right:4px;font-size:11px;"></i>৳${p.amount}</span>
          ${p.date ? `<span class="fr-meta">${new Date(p.date).toLocaleDateString('bn-BD')}</span>` : ''}
          ${p.note ? `<span class="fr-meta">· ${p.note}</span>` : ''}
        </div>
      </div>`).join('')
    : '<p class="hint">এখনো কোনো কিস্তি যোগ করা হয়নি।</p>';
  const pct = totalFee > 0 ? Math.min(100, Math.max(0, Math.round((paid/totalFee)*100))) : 0;
  return `
    <div class="accRow">
      <div class="accLabel"><i class="fas fa-receipt" style="margin-right:4px;"></i>পেমেন্ট / কিস্তি</div>
      <div class="payProgWrap">
        <div class="payProgOuter"><div class="payProgInner" style="width:${pct}%;"></div></div>
        <div class="payStatsRow">
          <div class="ps-item"><span class="hint" style="margin:0;">মোট ফি</span><b>৳${totalFee}</b></div>
          <div class="ps-item"><span class="hint" style="margin:0;">পরিশোধিত</span><b style="color:var(--ok);">৳${paid}</b></div>
          <div class="ps-item"><span class="hint" style="margin:0;">বাকি</span><b style="color:${due > 0 ? 'var(--fail)' : 'var(--ok)'};">৳${due}</b></div>
          <div class="ps-item"><span class="hint" style="margin:0;">অগ্রগতি</span><b>${pct}%</b></div>
        </div>
      </div>
      ${rowsHtml}
    </div>`;
}

function visaPromiseCompactHtml(j){
  if(!j || !j.visa_promised_days || !j.visa_promise_start) return '';
  const start = new Date(j.visa_promise_start);
  const deadline = new Date(start.getTime() + j.visa_promised_days * 86400000);
  const today = new Date();
  const msLeft = deadline.setHours(23,59,59,999) - today.getTime();
  const daysLeft = Math.ceil(msLeft / 86400000);
  const elapsed = Math.max(0, j.visa_promised_days - Math.max(daysLeft, 0));
  let color = 'var(--ok)', text = `প্রসেসিং সময় ${daysLeft} দিন`;
  if(daysLeft < 0){ color = 'var(--fail)'; text = `প্রসেসিং সময় শেষ, ${Math.abs(daysLeft)} দিন পার`; }
  else if(daysLeft <= 3){ color = 'var(--gold)'; text = `প্রসেসিং সময় মাত্র ${daysLeft} দিন`; }
  const elapsedHtml = daysLeft >= 0 ? `<span style="font-size:11px;font-weight:400;color:#8a93a3;display:inline-flex;align-items:center;gap:4px;"><i class="fas fa-calendar-day"></i>${elapsed} দিন পার হয়েছে</span>` : '';
  return `<span style="font-size:11px;font-weight:400;color:${color};display:inline-flex;align-items:center;gap:4px;margin-right:10px;"><i class="fas fa-hourglass-half"></i>${text}</span>${elapsedHtml}`;
}

let docImgCurrent = { base64: '', fileName: '' };
function openDocImage(base64, fileName){
  docImgCurrent = { base64, fileName: fileName || 'document' };
  document.getElementById('docImgOverlayImg').src = base64;
  document.getElementById('docImgDownload').href = base64;
  document.getElementById('docImgDownload').setAttribute('download', fileName || 'document');
  document.getElementById('docImgShare').style.display = navigator.share ? 'flex' : 'none';
  document.getElementById('docImgOverlay').style.display = 'flex';
}
function closeDocImage(){
  document.getElementById('docImgOverlay').style.display = 'none';
  document.getElementById('docImgOverlayImg').src = '';
}
async function shareDocImage(){
  if(!navigator.share || !docImgCurrent.base64) return;
  try{
    const res = await fetch(docImgCurrent.base64);
    const blob = await res.blob();
    const file = new File([blob], docImgCurrent.fileName || 'document.jpg', { type: blob.type || 'image/jpeg' });
    if(navigator.canShare && !navigator.canShare({ files: [file] })){
      await navigator.share({ url: docImgCurrent.base64 });
      return;
    }
    await navigator.share({ files: [file], title: docImgCurrent.fileName || 'ডকুমেন্ট' });
  }catch(e){ /* শেয়ার বাতিল/ব্যর্থ হলে চুপচাপ উপেক্ষা করা হবে */ }
}

function toggleAccItem(id){
  const el = document.getElementById('acc-' + id);
  const chev = document.getElementById('chev-' + id);
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(chev) chev.classList.toggle('open', !isOpen);
}

/* কাস্টমারের নিজের ফোন নম্বর বের করা — কাস্টম ফিল্ড (cf_phone ইত্যাদি) থেকে,
   কারণ u.phone আসলে মাতার মোবাইল নম্বর হিসেবে ব্যবহৃত হয় */
function getUserField(u, directKey, keywords){
  if(u && u[directKey]) return u[directKey];
  const cd = (u && u.custom_data) || {};
  for(const [fid, val] of Object.entries(cd)){
    const f = customFields[fid];
    if(f && f.label && keywords.some(k => f.label.toLowerCase().includes(k)) && val) return val;
  }
  return '';
}
function getUserPhone(u){ return getUserField(u, '', ['ফোন','phone','মোবাইল','mobile']) || ''; }

/* ================= VISA তথ্য (এজেন্টের জন্য শুধু দেখার জন্য) =================
   এজেন্টরা এখানে ভিসার তথ্য দেখতে পারেন, কিন্তু নিজে বিক্রি করতে পারেন না —
   বিক্রির বদলে "মেসেজ" পাঠিয়ে এডমিনকে জানান, এডমিন সেটা প্রসেস করেন। */
function renderVisaInfoList(){
  const container = document.getElementById('visaInfoList');
  if(!container) return;
  const entries = Object.entries(visaTypes);
  if(!entries.length){
    container.innerHTML = '<p class="hint">এখনো কোনো ভিসার ধরন যোগ করা হয়নি।</p>';
    return;
  }
  const groups = {};
  entries.forEach(([vid, v]) => {
    if(!groups[v.country]) groups[v.country] = [];
    groups[v.country].push({ vid, name: v.name, fee: v.fee || 0, quota: v.quota || 0, details: v.details || [] });
  });
  const searchEl = document.getElementById('visaSearch');
  const q = (searchEl ? searchEl.value : '').trim().toLowerCase();
  let countryNames = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'bn'));
  if(q) countryNames = countryNames.filter(c => c.toLowerCase().includes(q));
  if(!countryNames.length){
    container.innerHTML = '<p class="hint">এই নামে কোনো দেশ পাওয়া যায়নি।</p>';
    return;
  }

  const userEntries = Object.entries(allUsersCache);
  const journeyList = Object.values(myJourneys);

  container.innerHTML = countryNames.map(country => {
    const countryUserIds = userEntries.filter(([uid, u]) => u.country === country).map(([uid]) => uid);
    const active = journeyList.filter(j => countryUserIds.includes(j.user_id) && j.current_stage !== 'DEPARTED' && j.current_stage !== 'MEDICAL_FAILED').length;
    const departed = journeyList.filter(j => countryUserIds.includes(j.user_id) && j.current_stage === 'DEPARTED').length;
    const flag = COUNTRY_FLAGS[country] || '🌍';
    return groups[country].map(v => {
      const shareText = `${flag} ${country}\nভিসার ধরন: ${v.name}${v.fee ? ` (৳${v.fee.toLocaleString('bn-BD')})` : ''}\nমোট ভিসা: ${v.quota}\nচলমান প্রসেসিং: ${active}`;
      return `
      <div class="visaCard">
        <div class="vc-head">
          <div class="vc-title">${flag} ${country}</div>
          <span class="vc-price"><i class="fas fa-tag"></i> ভিসার মূল্য${v.fee ? `: ৳${v.fee.toLocaleString('bn-BD')}` : ''}</span>
        </div>
        ${v.name ? `<div class="visaDetailLine">${formatDetailChip(`ভিসার : ${v.name}`)}</div>` : ''}
        ${v.details.length ? `<div class="visaDetailLines">${v.details.map(d => `<div class="visaDetailLine">${formatDetailChip(d)}</div>`).join('')}</div>` : ''}
        <div class="visaStatRow">
          <div class="vsr-stats">
            <span>ভিসা <b>${v.quota || 0}</b></span>
            <span>প্রসেসিং <b style="color:var(--gold);">${active}</b></span>
            <span>সম্পন্ন <b style="color:var(--ok);">${departed}</b></span>
          </div>
          <div class="vsr-actions">
            <button type="button" class="icon-btn gold" title="আবেদন করুন" onclick='openVisaMessageModal(${JSON.stringify(country)}, ${JSON.stringify(v.vid)}, ${JSON.stringify(v.name)})'><span>আবেদন</span><i class="fas fa-file-circle-plus" style="font-size:12px;"></i></button>
            <button type="button" class="icon-btn" title="শেয়ার করুন" onclick='shareVisaInfo(${JSON.stringify(shareText).replace(/'/g, "&#39;")})'><span>শেয়ার</span><i class="fas fa-share"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }).join('');
}

function shareVisaInfo(text){
  if(navigator.share){
    navigator.share({ title: 'ভিসার তথ্য', text }).catch(() => {});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(() => alert('তথ্য কপি হয়েছে, এখন যেকোনো জায়গায় পেস্ট করে পাঠাতে পারবেন।'));
  } else {
    prompt('নিচের তথ্যটি কপি করুন:', text);
  }
}

let vmFiles = []; // [{base64, name, type}]

function handleVmFileSelect(event){
  const files = Array.from(event.target.files || []);
  if(!files.length) return;
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      vmFiles.push({ base64: e.target.result, name: file.name, type: file.type });
      pending--;
      if(pending === 0){ event.target.value = ''; renderVmFilePreview(); }
    };
    reader.readAsDataURL(file);
  });
}

function renderVmFilePreview(){
  const wrap = document.getElementById('vmFilePreviewWrap');
  const grid = document.getElementById('vmFilePreviewGrid');
  if(!vmFiles.length){ wrap.style.display = 'none'; grid.innerHTML = ''; return; }
  wrap.style.display = 'block';
  grid.innerHTML = vmFiles.map((f, i) => {
    const isImg = (f.type || '').startsWith('image/');
    const thumbInner = isImg
      ? `<img src="${f.base64}" style="width:100%;height:100%;object-fit:cover;" alt="">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f7f2ea;color:var(--gold);font-size:20px;"><i class="fas fa-file-lines"></i></div>`;
    return `
    <div style="position:relative;width:100%;aspect-ratio:1/1;">
      <div style="width:100%;height:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border);">${thumbInner}</div>
      <button type="button" onclick="removeVmFile(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--fail);color:#fff;border:2px solid #fff;font-size:10px;line-height:1;cursor:pointer;">✕</button>
    </div>`;
  }).join('');
}

function removeVmFile(i){
  vmFiles.splice(i, 1);
  renderVmFilePreview();
}

function clearVmFile(){
  document.getElementById('vmFile').value = '';
  vmFiles = [];
  renderVmFilePreview();
}

function openVisaMessageModal(country, visaId, visaName){
  vmContext = { country, visaId, visaName };
  document.getElementById('vmVisaLabel').textContent = `${country}${visaName ? ' — ' + visaName : ''} সম্পর্কে বার্তা`;
  document.getElementById('vmText').value = '';
  clearVmFile();
  document.getElementById('vmMsg').textContent = '';
  document.getElementById('visaMessageModal').classList.add('active');
}

function closeVisaMessageModal(){
  document.getElementById('visaMessageModal').classList.remove('active');
  vmContext = null;
}

async function sendVisaMessage(){
  const msgEl = document.getElementById('vmMsg');
  const text = document.getElementById('vmText').value.trim();
  msgEl.style.color = 'var(--fail)';
  if(!vmFiles.length){ msgEl.textContent = 'অনুগ্রহ করে অন্তত একটি ডকুমেন্ট সংযুক্ত করুন।'; return; }
  if(!vmContext){ return; }
  try{
    const filesPayload = vmFiles.map(f => ({ fileBase64: f.base64, fileName: f.name, fileType: f.type }));
    await db.ref('visaMessages').push({
      country: vmContext.country,
      visaId: vmContext.visaId,
      visaName: vmContext.visaName || '',
      agentId: currentAgentUid,
      agentName: (currentAgentData && currentAgentData.name) || 'অজানা',
      message: text,
      files: filesPayload,
      fileBase64: filesPayload[0].fileBase64,
      fileName: filesPayload[0].fileName,
      fileType: filesPayload[0].fileType,
      status: 'pending',
      createdAt: Date.now()
    });
    db.ref('agentMessages/' + currentAgentUid).push({
      type: 'visa_application_sent',
      text: 'আপনি ' + vmContext.country + (vmContext.visaName ? ' — ' + vmContext.visaName : '') + ' এর জন্য একটি আবেদন/বার্তা পাঠিয়েছেন।',
      relatedCountry: vmContext.country,
      relatedVisaName: vmContext.visaName || '',
      read: false,
      createdAt: Date.now()
    }).catch(() => {});

    msgEl.style.color = 'var(--ok)';
    msgEl.textContent = 'বার্তা পাঠানো হয়েছে।';
    setTimeout(closeVisaMessageModal, 700);
  }catch(e){
    msgEl.style.color = 'var(--fail)';
    msgEl.textContent = 'পাঠাতে ব্যর্থ: ' + e.message;
  }
}
